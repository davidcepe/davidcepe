<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CSS PETA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-dark:#0b061f;
  --card:rgba(255,255,255,0.05);
  --primary:#a855f7;
  --text:#f5f3ff;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top left,#1e0b3b,#0b061f 60%);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  opacity:0;
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

/* FLOATING GLOW BACKGROUND */

body::before,
body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  z-index:-1;
  animation:float 12s ease-in-out infinite alternate;
}

body::before{
  background:#9333ea55;
  top:-150px;
  left:-150px;
}

body::after{
  background:#c084fc44;
  bottom:-150px;
  right:-150px;
  animation-delay:4s;
}

@keyframes float{
  from{transform:translateY(0px);}
  to{transform:translateY(40px);}
}

/* HOME BUTTON (upper right) */

.nav-home{
  position:fixed;
  top:20px;
  right:30px;
  padding:10px 20px;
  border:1px solid var(--primary);
  border-radius:10px;
  background:transparent;
  color:var(--text);
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  z-index:10;
}

.nav-home:hover{
  background:var(--primary);
  color:black;
  box-shadow:0 0 20px #a855f7;
}

/* LOGIN CARD */

form{
  background:var(--card);
  backdrop-filter:blur(20px);
  padding:2.5rem;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.08);
  width:340px;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 40px #a855f744;
}

/* SLIDING LIGHT EFFECT */

form::before{
  content:"";
  position:absolute;
  top:0;
  left:-200%;
  width:200%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.2),
    transparent 70%
  );
  transform:skewX(-20deg);
  transition:0.8s;
}

form:hover::before{
  left:200%;
}

/* TITLE */

.glowTitle{
  font-size:32px;
  font-weight:600;
  margin-bottom:10px;
  background:linear-gradient(90deg,#c084fc,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* MESSAGE */

#loginMsg{
  font-size:18px;
  font-weight:600;
  opacity:0;
  transition:opacity 0.5s;
  margin-bottom:10px;
}

/* INPUTS */

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  font-family:'Poppins',sans-serif;
  transition:0.3s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 15px #a855f7;
}

/* BUTTONS */

.glowButton{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-family:'Poppins',sans-serif;
  margin-top:10px;
  background:linear-gradient(90deg,#c084fc,#a855f7);
  color:white;
  transition:0.3s;
}

.glowButton:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px #a855f7;
}
</style>
</head>

<body>

<!-- HOME BUTTON -->
<button class="nav-home" onclick="window.location.href='index.html'">Home</button>

<form id="loginForm">

<div id="loginMsg">Login message</div>

<h2 class="glowTitle">Login</h2>

<input type="email" id="username" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit" class="glowButton">Login</button>
<br><br>
<button type="button" id="registerBtn" class="glowButton">Register</button>

</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA4BMduzAUiqHMNCoha_DsDmBGnYeBz3Ww",
  authDomain: "css-peta.firebaseapp.com",
  projectId: "css-peta",
  storageBucket: "css-peta.firebasestorage.app",
  messagingSenderId: "470969817365",
  appId: "1:470969817365:web:7ef0585687c1cb7cbdb11c",
  measurementId: "G-Z5J2E9VN6B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

const loginForm = document.getElementById("loginForm");
const loginMsg = document.getElementById("loginMsg");

loginForm.addEventListener("submit", function(e){
  e.preventDefault();
  const email = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      loginMsg.style.color = "#00ff88";
      loginMsg.textContent = "Login successful!";
      loginMsg.style.opacity = 1;
      setTimeout(() => {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
      }, 1000);
    })
    .catch(error => {
      loginMsg.style.color = "#ff4d6d";
      loginMsg.textContent = "Login failed! " + error.message;
      loginMsg.style.opacity = 1;
    });
});

document.getElementById("registerBtn").addEventListener("click", () => {
  window.location.href = "reg.html";
});
</script>

</body>
</html>
